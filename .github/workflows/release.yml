name: Release Bun Package

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Typecheck
        run: pnpm run typecheck
      
      - name: Run tests
        run: pnpm test
      
      - name: Build
        run: pnpm run build
      
      - name: Build with Bun
        run: pnpm run bun:build
      
      - name: Copy ops SPA and config templates into dist-bun
        run: |
          cp -r dist/ops dist-bun/ops
          cp -r dist/config dist-bun/config
      
      - name: Verify build output
        run: |
          ls -la dist-bun/
          ls -la dist-bun/ops/
          ls -la dist-bun/config/
          echo "Build completed successfully"
      
      - name: Package release assets
        run: |
          cd dist-bun && zip -r ../chimera-ops.zip ops/ && zip -r ../chimera-config-templates.zip config/ && cd ..
          ls -lh chimera-ops.zip chimera-config-templates.zip dist-bun/index.js .env.example

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            dist-bun/index.js
            chimera-ops.zip
            chimera-config-templates.zip
            .env.example
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
