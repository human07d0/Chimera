services:
  mimo-proxy:
    build: .
    container_name: mimo-proxy
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # 必填：小米 MiMo API Key
      - MIMO_API_KEY=${MIMO_API_KEY}
      # 可选：代理服务自身鉴权 Key
      - PROXY_API_KEY=${PROXY_API_KEY:-}
      # 服务配置
      - PORT=3000
      - HOST=0.0.0.0
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # 上游配置
      - MIMO_BASE_URL=${MIMO_BASE_URL:-https://api.xiaomimimo.com}
      - MIMO_MODEL=${MIMO_MODEL:-mimo-v2-flash}
      # 联网搜索配置
      - WEB_SEARCH_MAX_KEYWORD=${WEB_SEARCH_MAX_KEYWORD:-3}
      - WEB_SEARCH_FORCE_SEARCH=${WEB_SEARCH_FORCE_SEARCH:-true}
      - WEB_SEARCH_LIMIT=${WEB_SEARCH_LIMIT:-3}
      - WEB_SEARCH_COUNTRY=${WEB_SEARCH_COUNTRY:-China}
      - WEB_SEARCH_REGION=${WEB_SEARCH_REGION:-Beijing}
      # Monitor 存储配置
      - MONITOR_STORAGE=${MONITOR_STORAGE:-memory}
      - MONITOR_SQLITE_PATH=${MONITOR_SQLITE_PATH:-./data/monitor.db}
      - MONITOR_RETENTION_DAYS=${MONITOR_RETENTION_DAYS:-30}
      - MONITOR_FLUSH_INTERVAL_MS=${MONITOR_FLUSH_INTERVAL_MS:-200}
      - MONITOR_FLUSH_BATCH_SIZE=${MONITOR_FLUSH_BATCH_SIZE:-100}
      - MONITOR_QUEUE_MAX_SIZE=${MONITOR_QUEUE_MAX_SIZE:-10000}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
