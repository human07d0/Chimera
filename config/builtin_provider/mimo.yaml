# config/builtin_provider/mimo.yaml
version: 1
type: mimo
name: xiaomi-mimo
api_key: ${MIMO_API_KEY}
auth_header: api-key
auth_prefix: ""

capabilities:
  thinking: true
  web_search: true
  json_output: true

web_search:
  max_keyword: 3
  force_search: false
  limit: 5
  user_location:
    country: CN
    region: ""
    city: ""

models:
  - id: mimo-v2-flash
    upstream: mimo-v2-flash
    context_length: 256000
    max_output_tokens: 64000

  - id: mimo-v2-pro
    upstream: mimo-v2-pro
    context_length: 1000000
    max_output_tokens: 128000

  - id: mimo-v2-omni
    upstream: mimo-v2-omni
    context_length: 256000
    max_output_tokens: 128000

  - id: mimo-v2.5
    upstream: mimo-v2.5
    context_length: 1000000
    max_output_tokens: 128000

  - id: mimo-v2.5-pro
    upstream: mimo-v2.5-pro
    context_length: 1000000
    max_output_tokens: 128000

  # Thinking variants
  - id: mimo-v2-flash-thinking
    upstream: mimo-v2-flash
    context_length: 256000
    max_output_tokens: 64000
    default:
      thinking:
        type: enabled

  - id: mimo-v2-pro-thinking
    upstream: mimo-v2-pro
    context_length: 1000000
    max_output_tokens: 128000
    default:
      thinking:
        type: enabled

  - id: mimo-v2-omni-thinking
    upstream: mimo-v2-omni
    context_length: 256000
    max_output_tokens: 128000
    default:
      thinking:
        type: enabled

  - id: mimo-v2.5-thinking
    upstream: mimo-v2.5
    context_length: 1000000
    max_output_tokens: 128000
    default:
      thinking:
        type: enabled

  - id: mimo-v2.5-pro-thinking
    upstream: mimo-v2.5-pro
    context_length: 1000000
    max_output_tokens: 128000
    default:
      thinking:
        type: enabled

  # Thinking + Search variants
  - id: mimo-v2-flash-thinking-search
    upstream: mimo-v2-flash
    context_length: 256000
    max_output_tokens: 64000
    default:
      thinking:
        type: enabled
      web_search: true

  - id: mimo-v2-pro-thinking-search
    upstream: mimo-v2-pro
    context_length: 1000000
    max_output_tokens: 128000
    default:
      thinking:
        type: enabled
      web_search: true

  - id: mimo-v2-omni-thinking-search
    upstream: mimo-v2-omni
    context_length: 256000
    max_output_tokens: 128000
    default:
      thinking:
        type: enabled
      web_search: true

  - id: mimo-v2.5-thinking-search
    upstream: mimo-v2.5
    context_length: 1000000
    max_output_tokens: 128000
    default:
      thinking:
        type: enabled
      web_search: true

  - id: mimo-v2.5-pro-thinking-search
    upstream: mimo-v2.5-pro
    context_length: 1000000
    max_output_tokens: 128000
    default:
      thinking:
        type: enabled
      web_search: true
