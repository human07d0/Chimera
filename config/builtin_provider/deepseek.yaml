# config/builtin_provider/deepseek.yaml
version: 1
type: deepseek
api_key: ${DEEPSEEK_API_KEY}
auth_header: Authorization
auth_prefix: "Bearer "

capabilities:
  thinking: true
  json_output: true

models:
  - id: deepseek-chat
    upstream: deepseek-chat
    context_length: 128000
    max_output_tokens: 8192

  - id: deepseek-reasoner
    upstream: deepseek-reasoner
    context_length: 128000
    max_output_tokens: 8192
    default:
      thinking:
        type: enabled
