# src/builtin_provider_config/mimo-token-plan-cn.yaml
version: 1
type: mimo
api_key: ${TOKEN_PLAN_MIMO_API_KEY}
auth_header: api-key
auth_prefix: ""
base_url: https://token-plan-cn.xiaomimimo.com
endpoint: /token-plan
anthropic_url: https://token-plan-cn.xiaomimimo.com/anthropic

capabilities:
  thinking: true
  web_search: true
  json_output: true

web_search:
  max_keyword: 3
  force_search: false
  limit: 5
  user_location:
    country: CN
    region: ""
    city: ""

models:
  - id: mimo-v2-flash
    upstream: mimo-v2-flash
    context_length: 256000
    max_output_tokens: 64000
    modalities:
      input: [text]
      output: [text]
    pricing:
      tiers:
        - max_tokens: -1
          input: 0.7
          cached_input: 0.07
          output: 2.1

  - id: mimo-v2-pro
    upstream: mimo-v2-pro
    context_length: 1000000
    max_output_tokens: 128000
    modalities:
      input: [text]
      output: [text]
    pricing:
      tiers:
        - max_tokens: 256000
          input: 7.0
          cached_input: 1.4
          output: 21.0
        - max_tokens: -1
          input: 14.0
          cached_input: 2.8
          output: 42.0

  - id: mimo-v2-omni
    upstream: mimo-v2-omni
    context_length: 256000
    max_output_tokens: 128000
    modalities:
      input: [text, image, video, audio]
      output: [text]
    pricing:
      tiers:
        - max_tokens: 256000
          input: 2.8
          cached_input: 0.56
          output: 14.0
        - max_tokens: -1
          input: 5.6
          cached_input: 1.12
          output: 28.0

  - id: mimo-v2.5
    upstream: mimo-v2.5
    context_length: 1000000
    max_output_tokens: 128000
    modalities:
      input: [text, image, video, audio]
      output: [text]
    pricing:
      tiers:
        - max_tokens: -1
          input: 1.0
          cached_input: 0.02
          output: 2.0

  - id: mimo-v2.5-pro
    upstream: mimo-v2.5-pro
    context_length: 1000000
    max_output_tokens: 128000
    modalities:
      input: [text]
      output: [text]
    pricing:
      tiers:
        - max_tokens: -1
          input: 3.0
          cached_input: 0.025
          output: 6.0

  - id: mimo-v2-flash-thinking
    upstream: mimo-v2-flash
    context_length: 256000
    max_output_tokens: 64000
    modalities:
      input: [text]
      output: [text]
    default:
      thinking:
        type: enabled

  - id: mimo-v2-pro-thinking
    upstream: mimo-v2-pro
    context_length: 1000000
    max_output_tokens: 128000
    modalities:
      input: [text]
      output: [text]
    default:
      thinking:
        type: enabled

