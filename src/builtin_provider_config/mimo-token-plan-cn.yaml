    upstream: mimo-v2-omni
    context_length: 256000
    max_output_tokens: 128000
    modalities:
      input: [text, image, video, audio]
      output: [text]
    default:
      thinking:
        type: enabled

  - id: mimo-v2.5-thinking
    upstream: mimo-v2.5
    context_length: 1000000
    max_output_tokens: 128000
    modalities:
      input: [text, image, video, audio]
      output: [text]
    default:
      thinking:
        type: enabled

  - id: mimo-v2.5-pro-thinking
    upstream: mimo-v2.5-pro
    context_length: 1000000
    max_output_tokens: 128000
    modalities:
      input: [text]
