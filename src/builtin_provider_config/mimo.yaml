# src/builtin_provider_config/mimo.yaml
version: 1
type: mimo
api_key: ${MIMO_API_KEY}
auth_header: api-key
auth_prefix: ""
base_url: https://api.xiaomimimo.com
anthropic_url: https://api.xiaomimimo.com/anthropic

capabilities:
  thinking: true
  web_search: true
  json_output: true

web_search:
  max_keyword: 3
  force_search: false
  limit: 5
  user_location:
    country: CN
    region: ""
    city: ""

models:
  - id: mimo-v2-flash
    upstream: mimo-v2-flash
    context_length: 256000
    max_output_tokens: 64000
    modalities:
      input: [text]
      output: [text]

  - id: mimo-v2-pro
    upstream: mimo-v2-pro
    context_length: 1000000
    max_output_tokens: 128000
    modalities:
      input: [text, image]
      output: [text]

  - id: mimo-v2-omni
    upstream: mimo-v2-omni
    context_length: 256000
    max_output_tokens: 128000
    modalities:
      input: [text, image, video, audio]
      output: [text]

  - id: mimo-v2.5
    upstream: mimo-v2.5
    context_length: 1000000
    max_output_tokens: 128000
    modalities:
      input: [text, image, video, audio]
      output: [text]

  - id: mimo-v2.5-pro
    upstream: mimo-v2.5-pro
    context_length: 1000000
    max_output_tokens: 128000
    modalities:
      input: [text, image]
      output: [text]

  # Thinking variants
  - id: mimo-v2-flash-thinking
    upstream: mimo-v2-flash
    context_length: 256000
    max_output_tokens: 64000
    modalities:
      input: [text]
      output: [text]
    default:
      thinking:
        type: enabled

  - id: mimo-v2-pro-thinking
    upstream: mimo-v2-pro
    context_length: 1000000
    max_output_tokens: 128000
    modalities:
      input: [text, image]
      output: [text]
    default:
      thinking:
        type: enabled

  - id: mimo-v2-omni-thinking
    upstream: mimo-v2-omni
    context_length: 256000
    max_output_tokens: 128000
    modalities:
      input: [text, image, video, audio]
      output: [text]
    default:
      thinking:
        type: enabled

  - id: mimo-v2.5-thinking
    upstream: mimo-v2.5
    context_length: 1000000
    max_output_tokens: 128000
    modalities:
      input: [text, image, video, audio]
      output: [text]
    default:
      thinking:
        type: enabled

  - id: mimo-v2.5-pro-thinking
    upstream: mimo-v2.5-pro
    context_length: 1000000
    max_output_tokens: 128000
    modalities:
      input: [text, image]
      output: [text]
    default:
      thinking:
        type: enabled

  # Thinking + Search variants
  - id: mimo-v2-flash-thinking-search
    upstream: mimo-v2-flash
    context_length: 256000
    max_output_tokens: 64000
    modalities:
      input: [text]
      output: [text]
    default:
      thinking:
        type: enabled
      web_search: true

  - id: mimo-v2-pro-thinking-search
    upstream: mimo-v2-pro
    context_length: 1000000
    max_output_tokens: 128000
    modalities:
      input: [text, image]
      output: [text]
    default:
      thinking:
        type: enabled
      web_search: true

  - id: mimo-v2-omni-thinking-search
    upstream: mimo-v2-omni
    context_length: 256000
    max_output_tokens: 128000
    modalities:
      input: [text, image, video, audio]
      output: [text]
    default:
      thinking:
        type: enabled
      web_search: true

  - id: mimo-v2.5-thinking-search
    upstream: mimo-v2.5
    context_length: 1000000
    max_output_tokens: 128000
    modalities:
      input: [text, image, video, audio]
      output: [text]
    default:
      thinking:
        type: enabled
      web_search: true

  - id: mimo-v2.5-pro-thinking-search
    upstream: mimo-v2.5-pro
    context_length: 1000000
    max_output_tokens: 128000
    modalities:
      input: [text, image]
      output: [text]
    default:
      thinking:
        type: enabled
      web_search: true
