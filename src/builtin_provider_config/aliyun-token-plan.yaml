# src/builtin_provider_config/aliyun-token-plan.yaml
version: 1
type: aliyun
api_key: ${ALIYUN_TOKEN_PLAN_API_KEY}
auth_header: Authorization
auth_prefix: "Bearer "
base_url: https://token-plan.cn-beijing.maas.aliyuncs.com/compatible-mode
endpoint: /token-plan
anthropic_url: https://token-plan.cn-beijing.maas.aliyuncs.com/apps/anthropic

capabilities:
  thinking: true
  json_output: true

