# src/builtin_provider_config/kimi.yaml
version: 1
type: kimi
api_key: ${KIMI_API_KEY}
auth_header: Authorization
auth_prefix: "Bearer "
base_url: https://api.moonshot.cn

capabilities:
  json_output: true

models:
  - id: kimi-k2.6
    upstream: kimi-k2.6
    context_length: 262144
    max_output_tokens: 262144
    modalities:
      input: [text, image]
      output: [text]
    description: Kimi K2.6 (multimodal, thinking)

  - id: kimi-k2.5
    upstream: kimi-k2.5
    context_length: 262144
    max_output_tokens: 262144
    modalities:
      input: [text, image]
      output: [text]
    description: Kimi K2.5 (multimodal, thinking)

  - id: moonshot-v1-128k
    upstream: moonshot-v1-128k
    context_length: 131072
    max_output_tokens: 131072
    modalities:
      input: [text]
      output: [text]
    description: Moonshot V1 128K

  - id: moonshot-v1-32k
    upstream: moonshot-v1-32k
    context_length: 32768
    max_output_tokens: 32768
    modalities:
      input: [text]
      output: [text]
    description: Moonshot V1 32K

  - id: moonshot-v1-8k
    upstream: moonshot-v1-8k
    context_length: 8192
    max_output_tokens: 8192
    modalities:
      input: [text]
      output: [text]
    description: Moonshot V1 8K
